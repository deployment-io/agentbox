name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY_DOCKERHUB: docker.io/deploymentio/agentbox
  REGISTRY_GHCR: ghcr.io/deployment-io/agentbox

jobs:
  release:
    name: Build and push Docker image (linux/amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Go build, vet, test (gate release)
        run: |
          go build ./...
          go vet ./...
          go test -race ./...

      - name: Build agentbox binary for linux/amd64
        run: |
          mkdir -p bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags="-s -w" -o bin/agentbox ./cmd/agentbox

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_DOCKERHUB }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_DOCKERHUB }}:latest
            ${{ env.REGISTRY_GHCR }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY_GHCR }}:latest
